buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.6.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(rootProject.projectDir.toPath().resolve("../node_modules/react-native/android"))
        }
        maven {
            // Android JSC is installed from npm
            url(rootProject.projectDir.toPath().resolve("../node_modules/jsc-android/dist"))
        }
        mavenCentral {
            // We don't want to fetch react-native from Maven Central as there are
            // temporary artifacts there that we don't want. Maven Central should
            // be used for other purposes only.
            content {
                excludeGroup("com.facebook.react")
            }
        }
        google()
        maven { url 'https://www.jitpack.io' }
    }
}

apply plugin: "com.facebook.react.rootproject"
