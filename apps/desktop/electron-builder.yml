# Electron Builder Configuration
# See https://www.electron.build/configuration/configuration

appId: com.emuz.app
productName: EmuZ
copyright: Copyright © 2024 EmuZ

directories:
  buildResources: build
  output: release

# File patterns
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

# Extra files to include
extraResources:
  - from: resources
    to: resources
    filter:
      - '**/*'

# macOS specific configuration
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.games
  darkModeSupport: true
  icon: build/icon.icns

# DMG configuration
dmg:
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows specific configuration
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

# NSIS installer configuration
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: EmuZ

# Linux specific configuration
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  maintainer: emuz@example.com
  category: Game
  icon: build/icons
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  synopsis: Cross-platform emulator frontend
  description: |
    EmuZ is a Daijishou-inspired cross-platform emulator frontend
    for managing and launching your retro game collection.

# AppImage configuration
appImage: {}

# Debian package configuration
deb:
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3

# Native dependencies that need rebuilding
# "sequential" uses @electron/rebuild to recompile native addons (e.g. better-sqlite3)
nativeRebuilder: sequential

# Publish configuration (disabled by default)
publish: null
# Auto update configuration
# Uncomment and configure for auto-updates
# publish:
#   provider: github
#   owner: emuz
#   repo: emuz
